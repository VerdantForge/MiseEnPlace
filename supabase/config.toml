
# Minimal config for running only Edge Functions (no DB, storage, or studio)
project_id = "starter-mcp-supabase"

[api]
enabled = true
port = 54321

[auth]
enabled = true
site_url = "http://localhost:54321"
additional_redirect_urls = [
	"http://localhost:54321/functions/v1/mcp-server/auth/authorize",
	"http://localhost:6274/oauth/callback",
	"http://localhost:6274/oauth/callback/debug",
	"http://127.0.0.1:19876/mcp/oauth/callback",
	"http://localhost:19876/mcp/oauth/callback",
]

[auth.oauth_server]
enabled = true
authorization_url_path = "/functions/v1/mcp-server/auth/authorize"
allow_dynamic_registration = true

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2
